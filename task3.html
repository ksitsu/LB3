<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 3</title>
</head>
<body>
    <h2>Задание 3: Взаимодействие с пользователем</h2>
    <script>
        let isAgeConfirmed = false;
        while (!isAgeConfirmed) {
            let age = prompt('Сколько вам лет?', '20', 'ddd');
            if (age !== null) {
                isAgeConfirmed = confirm('Вы уверены, что вам ' + age + '?');
            } else {
                break; 
            }
        }
    </script>
</body>
</html>
