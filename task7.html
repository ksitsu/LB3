<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание на повышенную оценку - Калькулятор</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        .calc-box { 
            display: inline-block; padding: 25px; 
            border: 2px solid #ccc; border-radius: 15px; 
            background: #fdfdfd; box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        input[type="text"] { 
            width: 60px; text-align: center; font-size: 20px; 
            margin: 5px; padding: 5px; border-radius: 5px; border: 1px solid #aaa; cursor: pointer;
        }
        select { font-size: 20px; padding: 5px; }
        #result { 
            width: 150px; padding: 10px; margin: 15px auto; 
            border: 2px solid #333; font-weight: bold; border-radius: 5px;
            font-size: 18px;
        }
        .keypad { 
            display: grid; grid-template-columns: repeat(3, 1fr); 
            gap: 8px; margin-top: 20px; 
        }
        .keypad button { 
            padding: 15px; font-size: 18px; cursor: pointer; 
            border-radius: 5px; border: 1px solid #ccc; background: #fff;
        }
        .keypad button:hover { background: #eee; }
        .calc-btn { 
            margin-top: 15px; padding: 10px 20px; font-size: 16px; 
            background: #4CAF50; color: white; border: none; border-radius: 5px; cursor: pointer;
        }
        .calc-btn:hover { background: #45a049; }
    </style>
</head>
<body>

<div class="calc-box">
    <h2>Калькулятор</h2>
    <input type="text" id="num1" readonly onclick="setActive('num1')" placeholder="X">
    <select id="op">
        <option value="+">+</option>
        <option value="-">-</option>
        <option value="*">*</option>
        <option value="/">/</option>
    </select>
    <input type="text" id="num2" readonly onclick="setActive('num2')" placeholder="Y">
    <br>
    <button class="calc-btn" onclick="calculate()">Посчитать</button>
    
    <div id="result">Ответ</div>

    <div class="keypad">
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('0')" style="grid-column: span 3;">0</button>
        <button onclick="clearAll()" style="grid-column: span 3; background: #ffcccc;">Очистить</button>
    </div>
</div>

<script>
    let activeInput = 'num1';

    function setActive(id) {
        activeInput = id;
        document.getElementById('num1').style.borderColor = (id === 'num1') ? 'blue' : '#aaa';
        document.getElementById('num2').style.borderColor = (id === 'num2') ? 'blue' : '#aaa';
    }

    function press(val) {
        let el = document.getElementById(activeInput);
        el.value += val;
    }
    
    function clearAll() {
        document.getElementById('num1').value = '';
        document.getElementById('num2').value = '';
        let resEl = document.getElementById('result');
        resEl.innerText = 'Ответ';
        resEl.style.backgroundColor = 'transparent';
    }

    function calculate() {
        let n1 = parseFloat(document.getElementById('num1').value);
        let n2 = parseFloat(document.getElementById('num2').value);
        let op = document.getElementById('op').value;
        let resEl = document.getElementById('result');
        
        if (isNaN(n1) || isNaN(n2)) {
            alert("Пожалуйста, заполните оба поля ввода!");
            return;
        }

        let ans;
        switch(op) {
            case '+': ans = n1 + n2; break;
            case '-': ans = n1 - n2; break;
            case '*': ans = n1 * n2; break;
            case '/': 
                if (n2 === 0) { alert("Деление на ноль!"); return; }
                ans = n1 / n2; 
                break;
        }

        if (ans > 15) {
            resEl.innerText = "число>15";
            resEl.style.backgroundColor = "red";
        } else {
            resEl.innerText = ans;
            resEl.style.backgroundColor = "transparent";
        }
    }
    
    // Инициализация при старте
    setActive('num1');
</script>

</body>
</html>
